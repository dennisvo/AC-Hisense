# Board: Seeed XIAO ESP32C3 (Seeed Studio)
# Definition: definitions/boards/seeed-xiao-esp32c3/manifest.yaml

esphome:
  name: hisense-ac
  friendly_name: Hisense AC
  area: Living Room

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

logger:
  level: DEBUG
  baud_rate: 0
   
api:
  encryption:
    key: !secret hisense_ac__encryption_key
ota:
  - platform: esphome
    password: !secret hisense_ac__ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "HiSense Fallback Hotspot"
    password: !secret hisense_ac__ap_password
captive_portal:

uart:
  id: ac_uart
  tx_pin: GPIO6
  rx_pin: GPIO7
  baud_rate: 9600
  stop_bits: 1
        
external_components:
  - source:
      type: git
      url: https://github.com/dennisvo/AC-Hisense
      ref: main
    components: [ ac_hi ]
    refresh: 1d
    
climate:
  - platform: ac_hi
    name: "Hisense AC"
    uart_id: ac_uart
    flow_control_pin: GPIO4   # Only for manual-direction RS485 boards (e.g. Seeed XIAO)
    update_interval: 2s
    enable_presets: true

    set_temperature:
      name: "Temperature Set"
      unit_of_measurement: "°C"
      accuracy_decimals: 0
      icon: "mdi:thermometer-check"

    room_temperature:
      name: "Temperature Current"
      unit_of_measurement: "°C"
      accuracy_decimals: 0
      icon: "mdi:home-thermometer"

    wind:
      name: "Wind Mode Code"
      accuracy_decimals: 0
      icon: "mdi:fan"

    sleep_stage:
      name: "Sleep Mode Code"
      accuracy_decimals: 0
      icon: "mdi:sleep"

    mode_code:
      name: "AC Mode Code"
      accuracy_decimals: 0
      icon: "mdi:air-conditioner"

    quiet:
      name: "Quiet Mode Code"
      accuracy_decimals: 0
      icon: "mdi:fan-off"

    turbo:
      name: "Turbo Mode Code"
      accuracy_decimals: 0
      icon: "mdi:flash"

    economy:
      name: "Economy Mode Code"
      accuracy_decimals: 0
      icon: "mdi:leaf"

    swing_up_down:
      name: "Swing Up-Down"
      accuracy_decimals: 0
      icon: "mdi:unfold-more-horizontal"

    swing_left_right:
      name: "Swing Left-Right"
      accuracy_decimals: 0
      icon: "mdi:unfold-more-vertical"

    power_status:
      name: "Power Status"
      icon: "mdi:power"

    pipe_temperature:
      name: "Temperature Pipe"
      unit_of_measurement: "°C"
      accuracy_decimals: 0
      icon: "mdi:coolant-temperature"

    compressor_frequency_set:
      name: "Compressor Frequency Set"
      unit_of_measurement: "Hz"
      accuracy_decimals: 0
      icon: "mdi:sine-wave"

    compressor_frequency:
      name: "Compressor Frequency"
      unit_of_measurement: "Hz"
      accuracy_decimals: 0
      icon: "mdi:sine-wave"

    compressor_exhaust_temperature:
      name: "Compressor Exhaust Temperature"
      unit_of_measurement: "°C"
      icon: "mdi:thermometer"

    outdoor_temperature:
      name: "Temperature Outdoor"
      unit_of_measurement: "°C"
      accuracy_decimals: 0
      icon: "mdi:thermometer"

    outdoor_condenser_temperature:
      name: "Temperature Outdoor Condenser"
      unit_of_measurement: "°C"
      accuracy_decimals: 0
      icon: "mdi:thermometer"

    # --- Auto-off timer ---
    auto_off_timer:
      name: "AC Auto Off Timer"

    auto_off_remaining:
      name: "AC Auto Off Remaining"
      unit_of_measurement: "min"
      accuracy_decimals: 0
      icon: "mdi:timer-sand"

    # --- LED target switch ---
    led_switch:
      name: "AC LED"
      icon: "mdi:lightbulb"

